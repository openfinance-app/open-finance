# =============================================================================
# docker-compose.yml — Open-Finance local run (end-user)
#
# Pulls pre-built images from GitHub Container Registry (GHCR).
# Does NOT build from source.
#
# Quick start:
#   1. cp .env.example .env   # then fill in JWT_SECRET and MASTER_PASSWORD
#   2. docker compose up -d
#   3. Open http://localhost:8080
#
# Pull a specific version:
#   OPEN_FINANCE_TAG=0.1.1-SNAPSHOT docker compose up -d
#
# Customise host ports via .env:
#   OLLAMA_PORT=11435   # if 11434 is taken
#   SEARXNG_PORT=8889   # if 8888 is taken
# =============================================================================

services:
  app:
    image: ghcr.io/albilu/open-finance:${OPEN_FINANCE_TAG:-latest}
    container_name: open-finance-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      MASTER_PASSWORD: "${MASTER_PASSWORD:-}"
      APPLICATION_OLLAMA_BASE_URL: "http://ollama:11434"
      APPLICATION_OLLAMA_MODEL: "${APPLICATION_OLLAMA_MODEL:-qwen2.5:0.5b}"
      APPLICATION_AI_PROVIDER: "${APPLICATION_AI_PROVIDER:-ollama}"
      APPLICATION_AI_OPENAI_API_KEY: "${APPLICATION_AI_OPENAI_API_KEY:-}"
      APPLICATION_CORS_ALLOWED_ORIGINS: "${APPLICATION_CORS_ALLOWED_ORIGINS:-http://localhost:8080}"
      APPLICATION_MARKET_DATA_YAHOO_FINANCE_URL: "${APPLICATION_MARKET_DATA_YAHOO_FINANCE_URL:-http://localhost:5000}"
      APPLICATION_SEARXNG_BASE_URL: "${APPLICATION_SEARXNG_BASE_URL:-http://searxng:8080}"
      LOGGING_LEVEL_ROOT: "${LOGGING_LEVEL_ROOT:-INFO}"
      LOGGING_LEVEL_ORG_OPENFINANCE: "${LOGGING_LEVEL_ORG_OPENFINANCE:-INFO}"
    volumes:
      - ./data:/app/data
      - open_finance_attachments:/app/attachments
      - open_finance_logs:/app/logs
      - open_finance_backups:/app/backups
      - open_finance_temp:/app/temp/imports
    depends_on:
      ollama:
        condition: service_healthy
      searxng:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/actuator/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - open-finance-network

  ollama:
    image: ollama/ollama:latest
    container_name: open-finance-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - open-finance-network
    # Uncomment to enable NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  searxng:
    image: searxng/searxng:latest
    container_name: open-finance-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SEARXNG_PORT:-8888}:8080"
    volumes:
      - "./searxng/config:/etc/searxng:rw"
      - "./data:/var/cache/searxng:rw"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    networks:
      - open-finance-network

volumes:
  ollama_data:
  open_finance_attachments:
  open_finance_logs:
  open_finance_backups:
  open_finance_temp:

networks:
  open-finance-network:
    driver: bridge
