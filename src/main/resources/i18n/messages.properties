# Insight messages
# ---------------------------------------------------------------------------
insight.spending.anomaly.title=Unusual Spending in {0}
insight.spending.anomaly.description=Your {0} spending is {1,number,#}% higher than last month ({2,number,#.##} vs {3,number,#.##}). This is significantly above your usual pattern.
insight.budget.exceeded.title={0} Budget Exceeded
insight.budget.exceeded.description=You''ve exceeded your {0} budget by {1,number,#.##} ({2,number,#}% over budget). Consider reviewing your spending in this category.
insight.budget.warning.title={0} Budget Approaching Limit
insight.budget.warning.description=You''ve spent {0,number,#}% of your {1} budget ({2,number,#.##} of {3,number,#.##}). You have {4,number,#.##} remaining.
insight.subscription.title=Subscription Review Opportunity
insight.subscription.description=You''re spending {0,number,#.##}/month on {1}. Review your subscriptions to ensure you''re using all services. Canceling unused subscriptions could save money.
insight.low.balance.title=Low Account Balance
insight.low.balance.description=Your {0} account balance is low ({1,number,#.##}). Consider transferring funds to avoid overdraft fees or declined transactions.
insight.cash.flow.negative.title=Negative Cash Flow
insight.cash.flow.negative.description=Your expenses exceeded your income by {0,number,#.##} this month. Review your spending to improve cash flow.
insight.unusual.transaction.new.payee.title=New Payee Detected: {0}
insight.unusual.transaction.new.payee.description=A transaction of {1,number,#.##} {2} to a new payee ''{0}'' was detected. If you don''t recognize this payee, review the transaction and consider contacting your bank.
insight.unusual.transaction.large.amount.title=Unusually Large Transaction Detected
insight.unusual.transaction.large.amount.description=A transaction of {0,number,#.##} {1} to ''{2}'' is {3,number,#}% above your usual amount for this payee (average: {4,number,#.##} {1}). Review this transaction if unexpected.
insight.unusual.transaction.large.amount.no.payee.title=Unusually Large Transaction Detected
insight.unusual.transaction.large.amount.no.payee.description=A transaction of {0,number,#.##} {1} dated {2} is significantly higher than your usual spending in this category. Review this transaction if unexpected.

# Region comparison insights
insight.region.income.title=Income vs Regional Average
insight.region.income.above.description=Your estimated monthly income of {0,number,#.##} {1} is {2,number,#}% above the national median for {3}. You''re earning more than most households in your country.
insight.region.income.below.description=Your estimated monthly income of {0,number,#.##} {1} is {2,number,#}% below the national median for {3}. Consider exploring ways to increase your income through skills development or side projects.
insight.region.networth.title=Net Worth Assessment
insight.region.networth.description=Your total net worth across all accounts is {0,number,#.##} {1}. In {2}, the median household net worth is approximately {3,number,#.##} {1}. {4}
insight.region.networth.above=This is above the national median — great progress!
insight.region.networth.below=This is below the national median. Focus on savings and debt reduction to build wealth.

# Tax obligation insights
insight.tax.estimate.title=Estimated Tax Obligation
insight.tax.estimate.description=Based on your annual income of approximately {0,number,#.##} {1}, your estimated annual tax liability in {2} is around {3,number,#.##} {1} (effective rate: {4,number,#.#}%). Consider consulting a tax advisor for personalized optimization.
insight.tax.deduction.title=Potential Tax Deductions
insight.tax.deduction.description=Based on your spending patterns, you may be able to claim deductions of up to {0,number,#.##} {1} in {2}. Categories like charitable donations, professional expenses, and retirement contributions are commonly deductible.

# Recurring billing insights
insight.recurring.summary.title=Recurring Expenses Summary
insight.recurring.summary.description=You have {0,number,integer} active recurring expenses totaling {1,number,#.##} {2}/month ({3,number,#.##} {2}/year). This represents {4,number,#}% of your estimated monthly income.
insight.recurring.high.ratio.title=High Recurring Expense Ratio
insight.recurring.high.ratio.description=Your recurring expenses of {0,number,#.##} {1}/month consume {2,number,#}% of your income. Financial advisors recommend keeping fixed costs below 50%. Review your subscriptions for potential savings.

