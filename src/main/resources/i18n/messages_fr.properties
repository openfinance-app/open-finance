# ---------------------------------------------------------------------------
# Insight messages
# ---------------------------------------------------------------------------
insight.spending.anomaly.title=Dépenses inhabituelles dans la catégorie {0}
insight.spending.anomaly.description=Vos dépenses dans la catégorie {0} sont {1,number,#} % plus élevées que le mois dernier ({2,number,#.##} contre {3,number,#.##}). Cela dépasse significativement votre habitude.
insight.budget.exceeded.title=Budget {0} dépassé
insight.budget.exceeded.description=Vous avez dépassé votre budget {0} de {1,number,#.##} ({2,number,#} % au-dessus du budget). Envisagez de revoir vos dépenses dans cette catégorie.
insight.budget.warning.title=Budget {0} proche de la limite
insight.budget.warning.description=Vous avez utilisé {0,number,#} % de votre budget {1} ({2,number,#.##} sur {3,number,#.##}). Il vous reste {4,number,#.##}.
insight.subscription.title=Opportunité de révision des abonnements
insight.subscription.description=Vous dépensez {0,number,#.##}/mois pour {1}. Vérifiez vos abonnements pour vous assurer que vous utilisez tous les services. L''annulation des abonnements inutilisés pourrait vous permettre d''économiser.
insight.low.balance.title=Solde de compte faible
insight.low.balance.description=Le solde de votre compte {0} est faible ({1,number,#.##}). Envisagez de transférer des fonds pour éviter les frais de découvert ou les transactions refusées.
insight.cash.flow.negative.title=Flux de trésorerie négatif
insight.cash.flow.negative.description=Vos dépenses ont dépassé vos revenus de {0,number,#.##} ce mois-ci. Revoyez vos dépenses pour améliorer vos flux de trésorerie.
insight.unusual.transaction.new.payee.title=Nouveau bénéficiaire détecté : {0}
insight.unusual.transaction.new.payee.description=Une transaction de {1,number,#.##} {2} vers un nouveau bénéficiaire ''{0}'' a été détectée. Si vous ne reconnaissez pas ce bénéficiaire, vérifiez la transaction et envisagez de contacter votre banque.
insight.unusual.transaction.large.amount.title=Transaction inhabituellement élevée détectée
insight.unusual.transaction.large.amount.description=Une transaction de {0,number,#.##} {1} vers ''{2}'' représente {3,number,#} % de plus que votre montant habituel pour ce bénéficiaire (moyenne : {4,number,#.##} {1}). Vérifiez cette transaction si elle vous semble inattendue.
insight.unusual.transaction.large.amount.no.payee.title=Transaction inhabituellement élevée détectée
insight.unusual.transaction.large.amount.no.payee.description=Une transaction de {0,number,#.##} {1} datée du {2} est nettement supérieure à vos dépenses habituelles dans cette catégorie. Vérifiez cette transaction si elle vous semble inattendue.

# Comparaison régionale
insight.region.income.title=Revenu vs Moyenne Régionale
insight.region.income.above.description=Votre revenu mensuel estimé de {0,number,#.##} {1} est {2,number,#} % supérieur à la médiane nationale pour {3}. Vous gagnez plus que la plupart des ménages de votre pays.
insight.region.income.below.description=Votre revenu mensuel estimé de {0,number,#.##} {1} est {2,number,#} % inférieur à la médiane nationale pour {3}. Envisagez d''explorer des moyens d''augmenter vos revenus par le développement de compétences ou des projets annexes.
insight.region.networth.title=Évaluation du Patrimoine
insight.region.networth.description=Votre patrimoine total sur l''ensemble de vos comptes est de {0,number,#.##} {1}. En {2}, le patrimoine médian des ménages est d''environ {3,number,#.##} {1}. {4}
insight.region.networth.above=C'est au-dessus de la médiane nationale — bravo !
insight.region.networth.below=C'est en dessous de la médiane nationale. Concentrez-vous sur l'épargne et la réduction de la dette pour développer votre patrimoine.

# Obligations fiscales
insight.tax.estimate.title=Estimation Fiscale
insight.tax.estimate.description=Sur la base de votre revenu annuel d''environ {0,number,#.##} {1}, votre impôt annuel estimé en {2} est d''environ {3,number,#.##} {1} (taux effectif : {4,number,#.#} %). Consultez un conseiller fiscal pour une optimisation personnalisée.
insight.tax.deduction.title=Déductions Fiscales Potentielles
insight.tax.deduction.description=D''après vos habitudes de dépenses, vous pourriez réclamer des déductions allant jusqu''à {0,number,#.##} {1} en {2}. Les dons aux œuvres, les frais professionnels et les cotisations retraite sont couramment déductibles.

# Dépenses récurrentes
insight.recurring.summary.title=Résumé des Dépenses Récurrentes
insight.recurring.summary.description=Vous avez {0,number,integer} dépenses récurrentes actives totalisant {1,number,#.##} {2}/mois ({3,number,#.##} {2}/an). Cela représente {4,number,#} % de votre revenu mensuel estimé.
insight.recurring.high.ratio.title=Ratio Élevé de Dépenses Récurrentes
insight.recurring.high.ratio.description=Vos dépenses récurrentes de {0,number,#.##} {1}/mois consomment {2,number,#} % de vos revenus. Les conseillers financiers recommandent de maintenir les coûts fixes en dessous de 50 %. Passez en revue vos abonnements pour économiser.

